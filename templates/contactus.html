{% extends "base.html" %}
{% load static %}
{% block title %}Contact{% endblock %}

{% block content %}
<style>
/* ===== Overseas FilipinoLoan Contact Us — Filipino Flag Style ===== */

:root {
  --ph-blue: #0032A0;
  --ph-blue-dark: #00226e;
  --ph-red: #BF0D3E;
  --ph-red-dark: #8b0628;
  --ph-gold: #FED141;
  --ph-gold-dark: #e6b820;
  --ink: #0a1a3a;
  --mut: #5a6378;
  --line: #e3e8f1;
}

html, body { width: 100%; overflow-x: hidden; }

body {
  margin: 0;
  min-height: 100vh;
  font-family: "Lato", "Open Sans", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif !important;
  color: var(--ink) !important;
  background:
    radial-gradient(800px 600px at 15% 20%, rgba(0,50,160,.10) 0%, transparent 60%),
    radial-gradient(700px 500px at 85% 80%, rgba(191,13,62,.08) 0%, transparent 60%),
    radial-gradient(500px 400px at 50% 50%, rgba(254,209,65,.10) 0%, transparent 65%),
    linear-gradient(180deg, #fafbff 0%, #eef2fb 100%) !important;
  background-attachment: fixed !important;
}
body, body *, body button, body input, body select, body textarea, body a {
  font-family: "Lato", "Open Sans", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif !important;
}

.wrap { padding-top: 0 !important; align-items: flex-start !important; justify-content: center !important; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.page {
  width: min(520px, 94vw);
  margin: 0 auto;
  padding: 22px 14px 40px;
  box-sizing: border-box;
}

/* Top row */
.cu-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 18px;
  opacity: 0;
  animation: fadeInUp .5s ease-out .05s forwards;
}
.cu-pagetitle {
  font-size: 24px;
  font-weight: 950;
  color: var(--ph-blue-dark);
  letter-spacing: -.4px;
}
.cu-pagetitle small {
  display: block;
  color: var(--mut);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .02em;
  margin-top: 3px;
}

.cu-back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 40px;
  padding: 0 16px;
  border-radius: 999px;
  background: #fff;
  color: var(--ph-blue-dark) !important;
  border: 2px solid var(--ph-blue);
  font-size: 12.5px;
  font-weight: 900;
  letter-spacing: .08em;
  text-transform: uppercase;
  text-decoration: none;
  box-shadow: 0 4px 12px rgba(0,50,160,.12);
  transition: all .22s ease;
  flex: 0 0 auto;
}
.cu-back-btn svg { width: 14px; height: 14px; }
.cu-back-btn:hover {
  color: #fff !important;
  background: var(--ph-blue);
  box-shadow: 0 8px 18px rgba(0,50,160,.30);
  transform: translateY(-2px);
}

/* ── Hero header card (premium navy with PH flag accents) ── */
.cardx.cu-hero {
  position: relative;
  padding: 24px 22px !important;
  border-radius: 22px !important;
  color: #ffffff !important;
  background:
    radial-gradient(140% 100% at 0% 0%, rgba(254,209,65,.18) 0%, transparent 55%),
    radial-gradient(140% 100% at 100% 100%, rgba(191,13,62,.22) 0%, transparent 55%),
    linear-gradient(135deg, var(--ph-blue-dark) 0%, var(--ph-blue) 100%) !important;
  border: 1px solid rgba(254,209,65,.40) !important;
  box-shadow:
    0 0 0 1px rgba(254,209,65,.08),
    0 12px 28px rgba(0,34,110,.30),
    inset 0 1px 0 rgba(255,255,255,.10) !important;
  margin-bottom: 14px;
  overflow: hidden;
  opacity: 0;
  animation: fadeInUp .55s ease-out .1s forwards;
}
.cu-hero::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--ph-gold), transparent);
}
.cu-hero::after {
  content: "";
  position: absolute;
  top: -50%; right: -20%;
  width: 240px; height: 240px;
  background: radial-gradient(circle, rgba(254,209,65,.20) 0%, transparent 60%);
  pointer-events: none;
}
.cu-hero > * { position: relative; z-index: 2; }

.cu-hero-row {
  display: flex;
  align-items: center;
  gap: 14px;
}
.cu-hero-ico {
  width: 52px; height: 52px;
  border-radius: 14px;
  background: rgba(254,209,65,.18);
  border: 1px solid rgba(254,209,65,.55);
  display: flex; align-items: center; justify-content: center;
  flex: 0 0 auto;
  box-shadow: 0 0 18px rgba(254,209,65,.25), inset 0 1px 0 rgba(255,255,255,.12);
}
.cu-hero-ico svg {
  width: 24px; height: 24px;
  fill: none; stroke: var(--ph-gold);
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}

/* ── Standard card (white with PH flag top stripe) ── */
.cardx {
  position: relative;
  padding: 24px 22px;
  border-radius: 18px;
  background: #ffffff;
  border: 1px solid var(--line);
  box-shadow: 0 4px 20px rgba(0,50,160,.08), 0 1px 3px rgba(0,0,0,.04);
  color: var(--ink);
  margin-bottom: 14px;
  overflow: hidden;
  opacity: 0;
  animation: fadeInUp .5s ease-out .18s forwards;
}
.cardx:not(.cu-hero)::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, var(--ph-blue), var(--ph-red), var(--ph-gold));
  border-radius: 18px 18px 0 0;
}

/* Titles */
.title {
  font-weight: 950;
  font-size: 18px;
  letter-spacing: .16em;
  text-transform: uppercase;
  margin: 0 0 6px;
  color: #ffffff;
}
.sub {
  font-size: 13px;
  color: rgba(255,255,255,.75);
  margin: 0;
  letter-spacing: .02em;
  line-height: 1.55;
}

/* Labels */
label {
  display: block;
  font-size: 11px;
  font-weight: 900;
  color: var(--ph-blue-dark);
  letter-spacing: .14em;
  text-transform: uppercase;
  margin: 14px 0 6px;
}

/* Inputs and textarea */
input, textarea {
  width: 100%;
  box-sizing: border-box;
  border-radius: 12px;
  border: 1.5px solid var(--line);
  background: #ffffff;
  color: var(--ink);
  padding: 13px 16px;
  outline: none;
  font-size: 14.5px;
  font-weight: 600;
  letter-spacing: .02em;
  font-family: inherit;
  transition: border-color .18s ease, box-shadow .18s ease;
}
input::placeholder, textarea::placeholder {
  color: #9ca3af;
  font-weight: 500;
}
textarea {
  min-height: 120px;
  resize: vertical;
  line-height: 1.5;
}
input:focus, textarea:focus {
  border-color: var(--ph-blue);
  box-shadow: 0 0 0 4px rgba(0,50,160,.10);
}

/* Send button */
.btn {
  width: 100%;
  margin-top: 18px;
  border: 0;
  border-radius: 999px;
  padding: 16px 20px;
  font-weight: 950;
  font-size: 14px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: #fff;
  cursor: pointer;
  font-family: inherit;
  background: linear-gradient(135deg, var(--ph-red) 0%, var(--ph-red-dark) 100%);
  box-shadow: 0 8px 22px rgba(191,13,62,.40);
  transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(191,13,62,.55);
  filter: brightness(1.08);
}
.btn:active { transform: scale(.99); }

/* Success alert */
.alert-success {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(22,163,74,.07);
  border: 1px solid rgba(22,163,74,.35);
  border-left: 4px solid #16a34a;
  border-radius: 14px;
  padding: 14px 16px;
  color: #166534;
  font-weight: 800;
  font-size: 13.5px;
  margin-bottom: 14px;
  letter-spacing: .01em;
  animation: fadeInUp .4s ease-out both;
}
.alert-success svg { width: 18px; height: 18px; flex: 0 0 auto; stroke: #16a34a; fill: none; stroke-width: 2.8; stroke-linecap: round; stroke-linejoin: round; }

.muted {
  font-size: 12px;
  color: var(--mut);
  margin-top: 10px;
  letter-spacing: .02em;
  font-weight: 600;
}

/* Mobile overrides — base.html disables .cardx animation, force visibility */
@media (max-width: 768px) {
  .cardx, .cardx.cu-hero {
    animation: none !important;
    opacity: 1 !important;
  }
  .cu-hero::after { animation: none !important; }
}

@media (max-width: 520px) {
  .page { padding: 18px 12px 40px; }
}
</style>

<div class="page">

  <!-- Top row: title + back -->
  <div class="cu-top">
    <div class="cu-pagetitle">
      Contact Us
      <small>We're here to help</small>
    </div>
    <a class="cu-back-btn" href="{% url 'dashboard' %}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back
    </a>
  </div>

  <!-- Hero header -->
  <div class="cardx cu-hero">
    <div class="cu-hero-row">
      <div class="cu-hero-ico" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div>
        <div class="title">Contact Us</div>
        <p class="sub">Send us a message — we will contact you soon.</p>
      </div>
    </div>
  </div>

  {% if sent %}
    <div class="alert-success">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Thank you! We will contact you soon.
    </div>
  {% endif %}

  <div class="cardx">
    <form method="POST" action="/contact/">
      {% csrf_token %}

      <label>Full name</label>
      <input type="text" name="full_name" placeholder="Your full name" required>

      <label>Phone / WhatsApp</label>
      <input type="tel" name="phone" placeholder="e.g. +63 900 000 0000" required>

      <label>Subject (optional)</label>
      <input type="text" name="subject" placeholder="What is this about?">

      <label>Message</label>
      <textarea name="message" placeholder="Type your message here..." required></textarea>

      <button class="btn" type="submit">Send Message</button>
    </form>
  </div>

</div>
{% endblock %}
