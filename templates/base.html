<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<!-- Global font: Lato (used site-wide for consistent professional look) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Open+Sans:wght@400;600;700;800&family=Noto+Sans:wght@400;600;700;900&family=Hind:wght@400;500;600;700&display=swap">
<script>
  /* Apply theme early to prevent flash */
  (function(){
    try {
      var t = localStorage.getItem("ofl-theme") || "light";
      document.documentElement.setAttribute("data-theme", t);
      // Set inline bg on <html> so the page paints in the correct
      // color BEFORE any stylesheet finishes parsing — kills the
      // white flash during page navigation.
      document.documentElement.style.backgroundColor = (t === "dark") ? "#0a132e" : "#ffffff";
    } catch(e) {
      document.documentElement.setAttribute("data-theme","light");
      document.documentElement.style.backgroundColor = "#ffffff";
    }
  })();
</script>
<style>
  /* Backup early-paint bg for html element so transition between
     pages does not flash white in dark mode. */
  html { background-color: #ffffff; }
  html[data-theme="dark"] { background-color: #0a132e; }
  /* Make .wrap transparent so html bg shows during page-enter fade-in */
  .wrap { background: transparent; }
</style>

/* ===== PAGE ENTER/LEAVE ANIMATION ===== */
.page-enter{
  animation: pageIn .45s ease both;
}
@keyframes pageIn{
  from{ opacity:0; transform: translateX(16px); }
  to{ opacity:1; transform: translateX(0); }
}
.page-leave{
  animation: pageOut .22s ease both;
}
@keyframes pageOut{
  from{ opacity:1; transform: translateX(0); }
  to{ opacity:0; transform: translateX(-14px); }
}

/* ===== PAGE WRAP (GLOBAL SAFE) ===== */
/* ===== PAGE WRAP (GLOBAL) ===== */
.wrap{
  width:100%;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding: 18px 5px 5px;   /* 🔥 top 18px | left-right 5px | bottom 5px */
  box-sizing:border-box;
  max-width: 1400px;
  margin: 0 auto;
}

/* make any page container centered (dash-wrap / card / any main box) */

/* ONLY when a page needs topbar spacing, add class "has-topbar" on .wrap */
.wrap.has-topbar{
  padding-top: 18px;
}

/* ===== GLASS CARD ===== */
.card{
  width:100%;
  max-width:420px;
  padding:28px;
  border-radius:18px;
  background:rgba(220,237,200,.22);
  backdrop-filter:blur(8px);         /* ✅ កាត់ពី 18px មក 8px */
  -webkit-backdrop-filter:blur(8px); /* ✅ កាត់ពី 18px មក 8px */
  box-shadow:0 30px 70px rgba(0,0,0,.45);
  animation: zoomIn .45s ease;
  text-align:center;
}

/* ✅ បន្ថែមនេះដើម្បីបិទ Blur នៅ Mobile (ធ្វើឲ្យលឿនជាង 60%) */
@media (max-width: 768px) {
  .card, .cardx {
    backdrop-filter: none !important;
    -webkit-backdrop-filter: none !important;
    animation: none !important; /* បិទ Animation នៅ Mobile */
  }
}

/* ===== ANIMATIONS ===== */
@keyframes zoomIn{
  from{transform:scale(.85);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* ===== SILVER RUN TEXT ===== */
.silver-run{
  background:linear-gradient(
    120deg,
    rgba(255,255,255,.7),
    rgba(255,255,255,1),
    rgba(200,200,200,.85),
    rgba(255,255,255,1),
    rgba(255,255,255,.7)
  );
  background-size:220% 100%;
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  animation:silverRun 2.6s linear infinite;
}
@keyframes silverRun{
  from{background-position:0%}
  to{background-position:220%}
}
.silver-run{
  animation-iteration-count: 3; /* ✅ រត់តែ 3 ដង ហើយឈប់ */
}

/* ===== WAVE EXCLAMATION ===== */
.wave-bang{
  display:inline-block;
  transform-origin:40% 70%;
  animation:waveBang 1.6s ease-in-out infinite;
}

@keyframes waveBang{
  0%{transform:rotate(0)}
  20%{transform:rotate(-12deg)}
  40%{transform:rotate(14deg)}
  60%{transform:rotate(-8deg)}
  80%{transform:rotate(10deg)}
  100%{transform:rotate(0)}
}

/* ===== GRID SYSTEM ===== */
.grid{
  display:grid;
  gap: 12px;
  grid-template-columns: repeat(12, 1fr);
  width: 100%;
  max-width: 800px;
  margin: 0 auto;
  padding: 0 14px;
}
.col-12{ grid-column: span 12; }
.col-6{ grid-column: span 6; }
.col-4{ grid-column: span 4; }
@media (max-width: 780px){
  .col-6,.col-4{ grid-column: span 12; }
}

/* ===== UTILITY CLASSES ===== */
.row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
}
h1,h2,h3{ margin:0 0 10px; }
.muted{
  color: rgba(255,255,255,.7);
  font-size: 14px;
}

/* ===== BUTTONS ===== */
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding: 12px 20px;
  border-radius: 999px;
  border: 0;
  cursor: pointer;
  font-weight: 700;
  text-decoration:none;
  transition: transform .08s ease, opacity .2s ease;
  user-select:none;
  white-space:nowrap;
  font-size: 14px;
}
.btn:active{ transform: scale(.98); }
.btn-primary{
  background: linear-gradient(90deg, #4a7a1e, #7CB342d0);
  color:#fff;
}
.btn-ghost{
  background: transparent;
  border: 1px solid rgba(255,255,255,.35);
  color: #fff;
}

/* ===== FORM STYLES ===== */
.field{ margin-bottom:12px; }
label{
  display:block;
  font-weight:600;
  margin-bottom:6px;
  color: rgba(255,255,255,.9);
}
input, select, textarea{
  width:100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.2);
  background: rgba(255,255,255,.1);
  color: #fff;
  outline:none;
  font-size: 14px;
}
input::placeholder, textarea::placeholder{
  color: rgba(255,255,255,.5);
}
input:focus, select:focus, textarea:focus{
  border-color: var(--g2);

<script>
// Back navigation handling: prefer history back; fallback to /dashboard/. Used globally.
// Prevent stuck or blank screens on back (including mobile bfcache/pageshow issues).

function flowBack() {
  // If there's a history (user navigated), go back. Otherwise, fallback.
  if (window.history.length > 1) {
    // Try to go back in history. For some browsers this may not leave the app; in those cases, fallback elsewhere.
    window.history.back();

    // Defensive: after a short timeout, if still same page, do fallback.
    setTimeout(function() {
      if (document.visibilityState !== 'hidden' && (performance.navigation && performance.navigation.type !== 2)) {
        // Not actually navigating back, so fallback.
        window.location.href = "/dashboard/";
      }
    }, 500);
  } else {
    window.location.href = "/dashboard/";
  }
}

// Prevent stuck/blank screens on page restore from bfcache (pageshow's persisted).
// If a transition was interrupted, reinstate the correct content and scroll.

(function () {
  const root = document.getElementById('pageRoot');
  if (!root) return;

  function saveScroll() {
    try {
      sessionStorage.setItem('page-scrollY', window.scrollY.toString());
      sessionStorage.setItem('page-scrollX', window.scrollX.toString());
    } catch (e) {}
  }
  function restoreScroll() {
    try {
      const scrollY = parseInt(sessionStorage.getItem('page-scrollY') || '', 10);
      const scrollX = parseInt(sessionStorage.getItem('page-scrollX') || '', 10);
      if (!isNaN(scrollY)) window.scrollTo(scrollX || 0, scrollY);
    } catch (e) {}
  }
  function setNavFlag() {
    try { sessionStorage.setItem('page-navigate', '1'); } catch (e) {}
  }
  function clearNavFlag() {
    try { sessionStorage.removeItem('page-navigate'); } catch (e) {}
  }
  function hasNavFlag() {
    try { return sessionStorage.getItem('page-navigate') === '1'; }
    catch (e) { return false; }
  }

  document.addEventListener('click', function (e) {
    const a = e.target.closest('a');
    if (!a) return;
    const href = a.getAttribute('href') || '';
    const target = a.getAttribute('target');
    if (target && target !== '_self') return;
    if (href.startsWith('#') || href.startsWith('javascript:')) return;
    if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;

    e.preventDefault();
    saveScroll();
    setNavFlag();

    root.classList.remove('page-enter');
    root.classList.add('page-leave');

    setTimeout(function () {
      window.location.href = href;
    }, 180);
  }, true);

  // Fix for blank/stuck screens on mobile and Safari back/forward navigation (bfcache).
  window.addEventListener('pageshow', function (event) {
    if (event.persisted || (performance.getEntriesByType("navigation")[0]?.type === "back_forward")) {
      if (hasNavFlag()) {
        clearNavFlag();
        restoreScroll();
        if (root) {
          root.classList.remove('page-leave');
          root.classList.add('page-enter');
        }
      } else {
        // In rare cases, forcibly restore .page-enter
        if (root && !root.classList.contains('page-enter')) {
          root.classList.remove('page-leave');
          root.classList.add('page-enter');
        }
      }
    }
  });

  clearNavFlag();
})();
</script>

<script>
(function() {
    // កំណត់ថា បើធំជាង 2MB ទើបបង្ហាប់
    const MAX_SIZE_MB = 2;
    const MAX_WIDTH = 1920;  // ទទឹងធំបំផុត
    const QUALITY = 0.85;    // គុណភាព 85%

    document.addEventListener('change', async function(e) {
        const input = e.target;
        
        // ពិនិត្យថាជា input file ឬអត់ និងមាន class "compress-img"
        if (!input.matches('input[type="file"].compress-img')) return;
        
        const file = input.files[0];
        if (!file || !file.type.startsWith('image/')) return;
        
        // បើតូចជាង 2MB ទុកដដែល
        if (file.size <= MAX_SIZE_MB * 1024 * 1024) return;

        // បង្ហាញ Loading
        const btn = input.closest('form')?.querySelector('button[type="submit"]');
        if (btn) {
            btn.disabled = true;
            btn.innerText = 'កំពុងបង្ហាប់រូប...';
        }

        try {
            const compressedFile = await compressImage(file);
            
            // ជំនួស File ដើមជាមួយ File បង្ហាប់
            const dataTransfer = new DataTransfer();
            dataTransfer.items.add(compressedFile);
            input.files = dataTransfer.files;
            
            console.log('បង្ហាប់រូបភាពរួចរាល់:', (compressedFile.size/1024).toFixed(1) + 'KB');
        } catch (err) {
            console.error('បរាជ័យ:', err);
        } finally {
            if (btn) {
                btn.disabled = false;
                btn.innerText = 'Confirm Apply';
            }
        }
    });

    function compressImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                
                img.onload = function() {
                    // គណនាទំហំថ្មី
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height = Math.round(height * (MAX_WIDTH / width));
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_WIDTH) {
                            width = Math.round(width * (MAX_WIDTH / height));
                            height = MAX_WIDTH;
                        }
                    }
                    
                    // បង្កើត Canvas
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    
                    // បំពេញផ្ទៃស (សម្រាប់ PNG)
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, width, height);
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // បំលែងជា JPEG
                    canvas.toBlob((blob) => {
                        if (!blob) return reject('Error');
                        const newFile = new File([blob], 
                            file.name.replace(/\.[^/.]+$/, '') + '.jpg', 
                            { type: 'image/jpeg', lastModified: Date.now() }
                        );
                        resolve(newFile);
                    }, 'image/jpeg', QUALITY);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }
})();
</script>
